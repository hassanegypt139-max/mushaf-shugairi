<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f5132">
    <title>مصحف الشقيري</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #0f5132;
            --secondary: #d4af37;
            --bg: #f5f0e1;
            --card: #ffffff;
            --text: #1a1a1a;
            --shadow: rgba(15, 81, 50, 0.15);
        }

        body {
            font-family: 'Amiri', 'Traditional Arabic', 'Scheherazade', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .header {
            background: linear-gradient(135deg, #0f5132 0%, #1a7a4d 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        .search-box {
            background: var(--card);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            padding: 8px;
        }

        .surah-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .surah-card {
            background: var(--card);
            border-radius: 16px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 12px var(--shadow);
            border: 2px solid transparent;
        }

        .surah-card:hover {
            transform: translateY(-3px);
            border-color: var(--secondary);
            box-shadow: 0 8px 25px var(--shadow);
        }

        .surah-number {
            background: linear-gradient(135deg, #0f5132 0%, #1a7a4d 100%);
            color: var(--secondary);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            flex-shrink: 0;
            box-shadow: 0 3px 10px var(--shadow);
            border: 2px solid var(--secondary);
        }

        .surah-info {
            flex: 1;
        }

        .surah-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .surah-meta {
            font-size: 13px;
            color: #666;
            display: flex;
            gap: 12px;
        }

        /* صفحة السورة */
        .surah-page {
            display: none;
            padding: 20px 15px;
        }

        .surah-page.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .surah-title {
            text-align: center;
            color: var(--primary);
            font-size: 32px;
            margin-bottom: 10px;
        }

        .surah-info-bar {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .bismillah {
            text-align: center;
            font-size: 28px;
            color: var(--primary);
            margin: 30px 0;
            font-weight: 700;
        }

        .ayah {
            background: var(--card);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 15px;
            font-size: 26px;
            line-height: 2.2;
            text-align: justify;
            box-shadow: 0 2px 10px var(--shadow);
            position: relative;
            cursor: pointer;
        }

        .ayah-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            background: var(--primary);
            color: var(--secondary);
            border-radius: 50%;
            font-size: 14px;
            font-weight: 700;
            margin: 0 8px;
        }

        .loading {
            text-align: center;
            padding: 50px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #eee;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .audio-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
        }

        .install-btn {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--secondary);
            color: var(--primary);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 999;
            font-family: inherit;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 26px; }
            .surah-name { font-size: 19px; }
            .ayah { font-size: 22px; padding: 20px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🌙 مصحف الشقيري</h1>
        <p>القرآن الكريم كاملاً</p>
    </header>

    <div class="container">
        <!-- صفحة السور -->
        <div id="homePage">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="ابحث عن سورة...">
            </div>
            <div class="surah-list" id="surahList"></div>
        </div>

        <!-- صفحة السورة -->
        <div id="surahPage" class="surah-page">
            <button class="back-btn" onclick="goHome()">→ رجوع</button>
            <h2 class="surah-title" id="surahTitle"></h2>
            <p class="surah-info-bar" id="surahInfo"></p>
            <div id="ayahContainer"></div>
        </div>
    </div>

    <!-- مشغل الصوت -->
    <div class="audio-player" id="audioPlayer" style="display:none">
        <div>
            <div style="font-size:14px;opacity:0.9" id="playerName">اسم السورة</div>
            <div style="font-size:18px;font-weight:700" id="playerReciter">الشيخ عبد الباسط</div>
        </div>
        <div style="display:flex;gap:10px">
            <button onclick="togglePlay()" style="background:var(--secondary);color:var(--primary);border:none;width:50px;height:50px;border-radius:50%;font-size:20px;cursor:pointer" id="playBtn">▶</button>
            <button onclick="closePlayer()" style="background:transparent;color:white;border:2px solid white;width:50px;height:50px;border-radius:50%;cursor:pointer">✕</button>
        </div>
    </div>

    <!-- زر التثبيت -->
    <button class="install-btn" id="installBtn" style="display:none" onclick="installApp()">
        📱 تثبيت التطبيق
    </button>

    <audio id="audio" preload="none"></audio>

        ];

        // عرض قائمة السور
        function renderSurahs(filter = '') {
            const list = document.getElementById('surahList');
            const filtered = surahs.filter(s => s.name.includes(filter));
            list.innerHTML = filtered.map(s => `
                <div class="surah-card" onclick="openSurah(${s.n})">
                    <div class="surah-number">${s.n}</div>
                    <div class="surah-info">
                        <div class="surah-name">سورة ${s.name}</div>
                        <div class="surah-meta">
                            <span>📍 ${s.t}</span>
                            <span>📜 ${s.a} آية</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // البحث
        document.getElementById('searchInput').addEventListener('input', e => {
            renderSurahs(e.target.value);
        });

        // فتح سورة
        async function openSurah(num) {
            document.getElementById('homePage').style.display = 'none';
            const page = document.getElementById('surahPage');
            page.classList.add('active');
            
            const surah = surahs.find(s => s.n === num);
            document.getElementById('surahTitle').textContent = `سورة ${surah.name}`;
            document.getElementById('surahInfo').textContent = `${surah.t} • ${surah.a} آية`;
            
            const container = document.getElementById('ayahContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>';
            
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/ar.alafasy`);
                const data = await res.json();
                
                if (data.code === 200) {
                    const surahData = data.data;
                    let html = num !== 1 && num !== 9 ? '<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>' : '';
                    
                    surahData.ayahs.forEach(ayah => {
                        html += `<div class="ayah" onclick="playSurah(${num})">${ayah.text} <span class="ayah-number">${ayah.numberInSurah}</span></div>`;
                    });
                    
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="loading"><p>❌ حدث خطأ</p></div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="loading"><p>❌ لا يوجد اتصال</p></div>';
            }
        }

        // العودة
        function goHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('surahPage').classList.remove('active');
            document.getElementById('audioPlayer').style.display = 'none';
            document.getElementById('audio').pause();
        }

        // تشغيل
        function playSurah(num) {
            const surah = surahs.find(s => s.n === num);
            const audio = document.getElementById('audio');
            const player = document.getElementById('audioPlayer');
            
            audio.src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${num}.mp3`;
            audio.play();
            
            document.getElementById('playerName').textContent = `سورة ${surah.name}`;
            player.style.display = 'flex';
        }

        function togglePlay() {
            const audio = document.getElementById('audio');
            const btn = document.getElementById('playBtn');
            if (audio.paused) {
                audio.play();
                btn.textContent = '⏸';
            } else {
                audio.pause();
                btn.textContent = '▶';
            }
        }

        function closePlayer() {
            document.getElementById('audioPlayer').style.display = 'none';
            document.getElementById('audio').pause();
        }

        // PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // بدء التشغيل
        renderSurahs();
    </script>
</body>
</html>
